    // --- Utility Functions ---
function shortText(text, words = 5) {
  if (!text) return "";
  const split = text.split(" ");
  return split.length > words
    ? split.slice(0, words).join(" ") + "..."
    : text;
}

// --- Sidebar navigation ---
function showSection(section) {

  const allSections = document.querySelectorAll('.admin-section');
  const activeSection = document.getElementById(section);

  // Hide all first
  allSections.forEach(sec => {
    sec.classList.add('hidden');
    gsap.set(sec, { opacity: 0, y: 20 });
  });

  // Show selected
  activeSection.classList.remove('hidden');

  // Animate in
  gsap.to(activeSection, {
    opacity: 1,
    y: 0,
    duration: 0.4,
    ease: "power2.out"
  });

  // Sidebar active styles
  document.querySelectorAll('.sidebar-link').forEach(btn => {
    btn.classList.remove('bg-gray-200', 'font-bold');
    const dot = btn.querySelector('.sidebar-dot');
    if (dot) dot.classList.add('hidden');
  });

  const activeBtn = Array.from(document.querySelectorAll('.sidebar-link'))
    .find(btn => btn.getAttribute('onclick')?.includes(section));

  if (activeBtn) {
    activeBtn.classList.add('bg-gray-200', 'font-bold');
    const dot = activeBtn.querySelector('.sidebar-dot');
    if (dot) dot.classList.remove('hidden');

    // Animate the dot 👇
    gsap.fromTo(dot,
      { scale: 0 },
      { scale: 1, duration: 0.3, ease: "back.out(2)" }
    );
  }

  localStorage.setItem('activeAdminSection', section);
}

// ================= Products =================
async function fetchProducts(loadMore = false) {
  let q;

  if (loadMore && lastProductVisible) {
    q = query(
      collection(db, 'products'),
      orderBy('name'),
      startAfter(lastProductVisible),
      limit(productsPerPage)
    );
  } else {
    q = query(
      collection(db, 'products'),
      orderBy('name'),
      limit(productsPerPage)
    );
  }

  const snapshot = await getDocs(q);

  if (!loadMore) {
    productsList = [];
  }

  snapshot.docs.forEach(docSnap => {
    const prod = { id: docSnap.id, ...docSnap.data() };
    productsList.push(prod);
  });

  // Update global allProducts for search
  allProducts = loadMore ? allProducts.concat(snapshot.docs.map(d => ({ id: d.id, ...d.data() }))) : snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

  renderProducts(productsList);

  // Save last visible for pagination
  lastProductVisible = snapshot.docs[snapshot.docs.length - 1];

  // Show/hide Load More button
  const btn = document.getElementById('load-more-products-btn');
  if (snapshot.size === productsPerPage) {
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
  }
}

// Render products table
function renderProducts(products) {
  const container = document.getElementById('products-list');
  container.innerHTML = '';
  products.forEach(p => {
    const row = document.createElement('tr');
    row.className = 'border-b';
    row.innerHTML = `
      <td class="p-2">${p.name}</td>
      <td class="p-2">
        ${p.images?.[0] ? `<img src="${p.images[0]}" class="w-16 h-16 object-cover rounded">` : '-'}
      </td>
      <td class="p-2">${p.brand || '-'}</td>
      <td class="p-2">₦${Number(p.price).toLocaleString()}</td>
      <td class="p-2">${p.condition || '-'}</td>
      <td class="p-2 max-w-xs truncate" title="${p.description || ''}">
        ${shortText(p.description, 5)}
      </td>
      <td class="p-2">
        <button class="bg-blue-600 text-white px-2 py-1 rounded mr-2" onclick="editProduct('${p.id}')">Edit</button>
        <button class="bg-red-500 text-white px-2 py-1 rounded" onclick="deleteProduct('${p.id}')">Delete</button>
      </td>
    `;
    container.appendChild(row);
  });

  gsap.from("#products-list tr", {
  opacity: 0,
  y: 15,
  duration: 0.4,
  stagger: 0.05,
  ease: "power2.out"
});
}

// Show search input
productSearchToggleBtn.addEventListener('click', () => {
  productSearchToggleBtn.classList.add('hidden');
  productSearchContainer.classList.remove('hidden');
  productSearchInput.focus();
});

// Hide search input
productCloseSearchBtn.addEventListener('click', () => {
  productSearchContainer.classList.add('hidden');
  productSearchToggleBtn.classList.remove('hidden');
  productSearchInput.value = '';
  renderProducts(allProducts.slice(0, productsPerPage));
  lastProductVisible = allProducts[productsPerPage - 1] || null;
  document.getElementById('load-more-products-btn').classList.toggle(allProducts.length > productsPerPage, true);
});

// Filter products on input
productSearchInput.addEventListener('input', () => {
  const query = productSearchInput.value.toLowerCase();
  filteredProducts = allProducts.filter(p =>
    p.name.toLowerCase().includes(query) ||
    (p.description?.toLowerCase().includes(query) ?? false) ||
    (p.brand?.toLowerCase().includes(query) ?? false)
  );

  renderProducts(filteredProducts.slice(0, productsPerPage));

  // Show Load More if filtered list is bigger than page
  const btn = document.getElementById('load-more-products-btn');
  if (filteredProducts.length > productsPerPage) {
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
  }

  // Reset last visible for filtered list
  lastProductVisible = filteredProducts[productsPerPage - 1] || null;
});

// Load more button
document.getElementById('load-more-products-btn').addEventListener('click', () => {
  let nextProducts;
  if (productSearchInput.value) {
    // Loading more for filtered search
    const start = productsList.length;
    nextProducts = filteredProducts.slice(start, start + productsPerPage);
    productsList = productsList.concat(nextProducts);
    renderProducts(productsList);

    // Update last visible
    lastProductVisible = productsList[productsList.length - 1] || null;

    if (productsList.length >= filteredProducts.length) {
      document.getElementById('load-more-products-btn').classList.add('hidden');
    }
  } else {
    fetchProducts(true);
  }
});

async function addProduct(e) {
  e.preventDefault();
  const name = document.getElementById('product-name').value;
  const brand = document.getElementById('product-brand').value;
  const price = parseFloat(document.getElementById('product-price').value);
  const condition = document.getElementById('product-condition').value;
  const image = document.getElementById('product-image').value;
  const description = document.getElementById('product-description').value;

  try {
    if (editingProductId) {
      // UPDATE existing product
      await setDoc(doc(db, 'products', editingProductId), {
        name, brand, price, condition, description, images: [image]
      });
      editingProductId = null;
      document.querySelector('#product-form button').textContent = 'Add';
    } else {
      // ADD new product
      await addDoc(collection(db, 'products'), { name, brand, price, condition, description, images: [image] });
    }
    e.target.reset();
    fetchProducts();
  } catch(err) {
    console.error("Error adding/updating product:", err);
    alert(err.message);
  }
}

async function deleteProduct(id) {
  if(confirm('Are you sure you want to delete this product?')) {
    await deleteDoc(doc(db, 'products', id));
    fetchProducts();
  }
}

function editProduct(id) {
  const row = Array.from(document.querySelectorAll('#products-list tr'))
    .find(r => r.querySelector('button')?.onclick?.toString().includes(id));

  // fetch product data from Firestore
  getDocs(collection(db, 'products')).then(snapshot => {
    const docData = snapshot.docs.find(d => d.id === id);
    if (!docData) return;
    const data = docData.data();
    document.getElementById('product-name').value = data.name;
    document.getElementById('product-brand').value = data.brand || '';
    document.getElementById('product-price').value = data.price;
    document.getElementById('product-condition').value = data.condition || '';
    document.getElementById('product-description').value = data.description || '';
    document.getElementById('product-image').value = data.images?.[0] || '';

    editingProductId = id;
    document.querySelector('#product-form button').textContent = 'Update';
  });
}

// ================= Hero =================
async function fetchHero() {
  const snapshot = await getDocs(collection(db, 'hero'));

  heroSlides = snapshot.docs.map(docSnap => ({
    id: docSnap.id,
    ...docSnap.data()
  }));

  renderHeroList();
}

// Render hero slides
function renderHeroList() {
  const container = document.getElementById('hero-list');
  container.innerHTML = '';

  if (heroSlides.length === 0) {
    container.innerHTML = `<p class="text-gray-500 text-sm">No hero slides yet.</p>`;
    return;
  }

  heroSlides.forEach(slide => {
    const div = document.createElement('div');
    div.className = "border p-3 rounded flex justify-between items-center";

        // Determine if the URL is an image (simple check)
    const mediaHtml = slide.url
      ? slide.url.match(/\.(jpeg|jpg|gif|png|webp)$/i)
        ? `<img src="${slide.url}" class="w-24 h-16 object-cover rounded" alt="Hero Image">`
        : `<video src="${slide.url}" class="w-24 h-16 object-cover rounded" controls></video>`
      : `<div class="w-24 h-16 bg-gray-200 flex items-center justify-center text-gray-400 text-xs">No Media</div>`;

      div.innerHTML = `
      <div class="flex items-center space-x-4">
        ${mediaHtml}
        <div>
          <strong>${slide.headline}</strong>
          <div class="text-sm text-gray-500">${slide.type}</div>
        </div>
      </div>
      <div class="space-x-2">
        <button class="bg-yellow-500 text-white px-2 py-1 rounded" data-edit="${slide.id}">Edit</button>
        <button class="bg-red-500 text-white px-2 py-1 rounded" data-delete="${slide.id}">Delete</button>
      </div>
    `;

    container.appendChild(div);
  });

  bindHeroButtons();
}

let draggedId = null;

function enableDrag() {
  document.querySelectorAll('tr[draggable]').forEach(row => {

    row.addEventListener('dragstart', () => {
      draggedId = row.dataset.id;
      row.classList.add('opacity-50');
    });

    row.addEventListener('dragend', () => {
      row.classList.remove('opacity-50');
    });

    row.addEventListener('dragover', e => e.preventDefault());

    row.addEventListener('drop', async () => {
      const targetId = row.dataset.id;
      if (draggedId === targetId) return;

      const draggedIndex = heroSlides.findIndex(s => s.id === draggedId);
      const targetIndex = heroSlides.findIndex(s => s.id === targetId);

      const temp = heroSlides[draggedIndex].order;
      heroSlides[draggedIndex].order = heroSlides[targetIndex].order;
      heroSlides[targetIndex].order = temp;

      await Promise.all([
        setDoc(doc(db, 'hero', draggedId), { order: heroSlides[draggedIndex].order }, { merge: true }),
        setDoc(doc(db, 'hero', targetId), { order: heroSlides[targetIndex].order }, { merge: true })
      ]);

      fetchHero();
    });

  });
}

// Attach button events
function bindHeroButtons() {
  document.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => editHeroSlide(btn.dataset.edit));
  });

  document.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => deleteHeroSlide(btn.dataset.delete));
  });
}

// Fill form for editing
function editHeroSlide(id) {
  const slide = heroSlides.find(h => h.id === id);
  if (!slide) return;

  document.getElementById('hero-doc-id').value = slide.id;
  document.getElementById('hero-headline').value = slide.headline;
  document.getElementById('hero-subheadline').value = slide.subheadline;
  document.getElementById('hero-cta1').value = slide.cta_primary_text;
  document.getElementById('hero-cta2').value = slide.cta_secondary_text;
  document.getElementById('hero-type').value = slide.type;
  document.getElementById('hero-url').value = slide.url;
}

document.getElementById('hero-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  if (!heroHeadline.value.trim() && !heroUrl.value.trim()) {
  alert('Hero slide must have at least a headline or media URL');
  return;
}

  const id = document.getElementById('hero-doc-id').value;

  cta_secondary_text: heroCta2.value.trim(),

// ================= Orders =================
async function fetchOrders(loadMore = false) {

  let q;

  if (loadMore && lastOrderVisible) {
    q = query(
      collection(db, 'orders'),
      orderBy('createdAt', 'desc'),
      startAfter(lastOrderVisible),
      limit(ordersPerPage)
    );
  } else {
    q = query(
      collection(db, 'orders'),
      orderBy('createdAt', 'desc'),
      limit(ordersPerPage)
    );
  }

  const snapshot = await getDocs(q);

  if (!loadMore) {
    orders = [];
  }

  snapshot.docs.forEach(docSnap => {
    orders.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  renderOrders(orders);

  // Save last visible document
  lastOrderVisible = snapshot.docs[snapshot.docs.length - 1];

  // Show or hide Load More button
  const loadBtn = document.getElementById('load-more-btn');

  if (snapshot.size === ordersPerPage) {
    loadBtn.classList.remove('hidden');
  } else {
    loadBtn.classList.add('hidden');
  }
}

onAuthStateChanged(auth, async (user) => {
  const loginSection = document.getElementById('login-section');
  const mainPanel = document.querySelector('main');
  const logoutBtn = document.getElementById('logout-btn');

  if (user) {
    try {
      // Check if admin doc exists in Firestore
      const adminDoc = await getDoc(doc(db, "admins", user.uid));

      if (!adminDoc.exists()) {
        alert("You are not authorized!");
        await signOut(auth);
        return;
      }

      // Admin is authorized, show dashboard
      loginSection.classList.add('hidden');
      mainPanel.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');

      // Fetch all admin data
      fetchProducts();
      fetchGadgets();
      fetchHero();
      fetchOrders();
      fetchAdmins();

    } catch (err) {
      console.error("Admin check failed:", err);
      alert("Access denied");
      await signOut(auth);
    }
  } else {
    // No user logged in
    loginSection.classList.remove('hidden');
    mainPanel.classList.add('hidden');
    logoutBtn.classList.add('hidden');
  }

  gsap.from("main", {
  opacity: 0,
  y: 30,
  duration: 0.5,
  ease: "power3.out"
});

async function fetchAdmins() {
  const snapshot = await getDocs(collection(db, "admins"));

  listContainer.innerHTML = "";
  snapshot.docs.forEach(doc => {
    listContainer.innerHTML += `<div>${doc.data().email}</div>`;
  });
}

// PDF Download
async function downloadPdf(order) {
  if (!order) return;

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p", "mm", "a4");

    const pageWidth = doc.internal.pageSize.getWidth();
    const margin = 15;
    let y = 20;

    // ===== TITLE =====
    doc.setFont("helvetica","bold");
    doc.setFontSize(18);
    doc.text("ORDER RECEIPT", margin, y);
    y += 10;

    // ===== CUSTOMER INFO =====
    doc.setFont("helvetica","normal");
    doc.setFontSize(12);

    doc.text(`Name: ${order.shipping?.name || ""}`, margin, y); y+=7;
    doc.text(`Email: ${order.shipping?.email || ""}`, margin, y); y+=7;
    doc.text(`Phone: ${order.shipping?.phone || ""}`, margin, y); y+=7;
    doc.text(`Payment Ref: ${order.paymentReference || ""}`, margin, y);
    y += 10;

    // ===== ITEMS =====
    doc.setFont("helvetica","bold");
    doc.text("Items:", margin, y);
    y += 7;

    doc.setFont("helvetica","normal");

    order.items?.forEach(item => {
      doc.text(
        `${item.name}  x${item.quantity}  - ₦${(item.price * item.quantity).toLocaleString()}`,
        margin,
        y
      );
      y += 7;
    });

    y += 5;
    doc.setFont("helvetica","bold");
    doc.text(`Shipping Fee: ₦${Number(order.shippingFee || 0).toLocaleString()}`, margin, y);
    y += 7;
    doc.text(`Total: ₦${Number(order.total || 0).toLocaleString()}`, margin, y);

    doc.save(`Order_${order.id}.pdf`);

  } catch(err) {
    console.error(err);
    alert("Failed to generate PDF");
  }
}
